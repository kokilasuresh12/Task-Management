providers = ['python']

[phases.setup]
nixPkgs = ['...', 'nodejs_22']

[phases.install]
cmds = [
  'pip install -r requirements.txt',
  'cd frontend && npm ci',
]

[phases.build]
cmds = [
  'cd frontend && npm run build',
  'python manage.py collectstatic --noinput',
]

[start]
cmd = 'python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000}'
