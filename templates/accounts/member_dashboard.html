<!DOCTYPE html>
<html>
<head>
    <title>Team Member Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="mb-4">Team Member Dashboard</h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h2>{{ total_tasks }}</h2>
                    <p>Total Assigned Tasks</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h2>{{ completed_tasks }}</h2>
                    <p>Completed Tasks</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h2>{{ pending_tasks }}</h2>
                    <p>Pending Tasks</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card">
                <div class="card-body text-center">
                    <h2>{{ progress_percentage }}%</h2>
                    <p>Progress</p>
                </div>
            </div>
        </div>

    </div>

    <br>

    <h4>Progress Overview</h4>

    <div class="progress">
        <div
            class="progress-bar"
            role="progressbar"
            style="width: {{ progress_percentage }} %;"
        >
            {{ progress_percentage }}%
        </div>
    </div>

    <br>

    <a href="{% url 'member_tasks' %}" class="btn btn-primary">
        View My Tasks
    </a>

    <a href="{% url 'logout' %}" class="btn btn-danger">
        Logout
    </a>

</div>

</body>
</html>
