<!DOCTYPE html>
<html>
<head>
    <title>Team Leader Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1 class="mb-4">Team Leader Dashboard</h1>

    <div class="card mb-3">
        <div class="card-body">
            <h5>Welcome Team Leader</h5>
            <p>Manage tasks and monitor team progress.</p>
        </div>
    </div>

    <div class="d-grid gap-2 col-4">

        <a href="{% url 'create_task' %}" class="btn btn-primary">
            Create Task
        </a>

        <a href="{% url 'task_list' %}" class="btn btn-success">
            View Tasks
        </a>

        <a href="{% url 'logout' %}" class="btn btn-danger">
            Logout
        </a>

    </div>

</div>

</body>
</html>
