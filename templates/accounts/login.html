<!DOCTYPE html>
<html>
<head>
    <title>Task Management Login</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color:#f4f4f4;
        }

        .container{
            width:400px;
            margin:80px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h2{
            text-align:center;
        }

        button{
            width:100%;
            padding:10px;
            background-color:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:#0056b3;
        }

        .error{
            color:red;
            text-align:center;
        }

    </style>

</head>
<body>

<div class="container">

    <h2>Task Management System</h2>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
