<!DOCTYPE html>
<html>
<head>
    <title>Update Progress</title>
</head>
<body>

    <h2>Update Task Progress</h2>

    <h3>Task: {{ task.task_name }}</h3>

    <p>
        Current Progress: {{ task.progress }}%
    </p>

    <p>
        Current Status: {{ task.status }}
    </p>

    <hr>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Update Progress
        </button>

    </form>

    <br>

    <a href="{% url 'member_tasks' %}">
        Back to My Tasks
    </a>

</body>
</html>
