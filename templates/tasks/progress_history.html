<!DOCTYPE html>
<html>
<head>
    <title>Progress History</title>
</head>
<body>

<h2>Progress History</h2>

<h3>{{ task.task_name }}</h3>

<table border="1">

<tr>
    <th>Progress</th>
    <th>Comment</th>
    <th>Date</th>
</tr>

{% for update in updates %}

<tr>
    <td>{{ update.progress }}%</td>
    <td>{{ update.comment }}</td>
    <td>{{ update.updated_at }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="{% url 'member_tasks' %}">
    Back to My Tasks
</a>

</body>
</html>
