<!DOCTYPE html>
<html>
<head>
    <title>Create Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f6f7fb; color:#1f2937; }
        .app-shell { max-width:900px; margin:0 auto; padding:28px 16px 48px; }
        .topbar { background:#fff; border-bottom:1px solid #e5e7eb; }
        .panel { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:22px; }
        label { font-weight:600; }
        input, select, textarea { width:100%; padding:9px 11px; border:1px solid #d1d5db; border-radius:6px; margin-bottom:12px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="app-shell py-3 d-flex justify-content-between align-items-center">
        <strong>Task Management</strong>
        <a href="{% url 'tl_dashboard' %}" class="btn btn-sm btn-outline-secondary">Back</a>
    </div>
</div>

<main class="app-shell">
    <h2 class="fw-bold">Create Task</h2>
    <p class="text-secondary mb-4">Assign work to a team member</p>

    <div class="panel">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save Task</button>
        </form>
    </div>
</main>

</body>
</html>
