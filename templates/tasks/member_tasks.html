<h2>My Tasks</h2>

<table border="1">

<tr>
    <th>Task</th>
    <th>Progress</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for task in tasks %}

<tr>

<td>{{ task.task_name }}</td>

<td>{{ task.progress }}%</td>

<td>{{ task.status }}</td>

<td>

<a href="{% url 'update_progress' task.id %}">
Update
</a>

|

<a href="{% url 'progress_history' task.id %}">
History
</a>

</td>

</tr>

{% endfor %}

</table>
