<!DOCTYPE html>
<html>
<head>
    <title>Project List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#f6f7fb; color:#1f2937; }
        .app-shell { max-width:1120px; margin:0 auto; padding:28px 16px 48px; }
        .topbar { background:#fff; border-bottom:1px solid #e5e7eb; }
        .panel { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:20px; }
    </style>
</head>
<body>

<div class="topbar">
    <div class="app-shell py-3 d-flex justify-content-between align-items-center">
        <strong>Task Management</strong>
        <a href="{% url 'manager_dashboard' %}" class="btn btn-sm btn-outline-secondary">Dashboard</a>
    </div>
</div>

<main class="app-shell">
<h2 class="fw-bold">Projects</h2>
<p class="text-secondary mb-4">Assigned project status and deadlines</p>

<div class="panel table-responsive">
<table class="table table-hover align-middle">

<tr>
    <th>Name</th>
    <th>Team Leader</th>
    <th>Deadline</th>
    <th>Status</th>
</tr>

{% for project in projects %}

<tr>
    <td>{{ project.name }}</td>
    <td>{{ project.assigned_tl }}</td>
    <td>{{ project.deadline }}</td>
    <td><span class="badge text-bg-secondary">{{ project.status }}</span></td>
</tr>

{% empty %}
<tr>
    <td colspan="4" class="text-center text-secondary">No projects found.</td>
</tr>
{% endfor %}

</table>
</div>
</main>

</body>
</html>
